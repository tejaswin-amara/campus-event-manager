# ── Production Profile ──────────────────────────────────────────
# Activate via: SPRING_PROFILES_ACTIVE=prod

# Schema managed by Flyway; Hibernate only validates
spring.jpa.hibernate.ddl-auto=validate

# MySQL TLS — override default connection string flags
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:campus_events}?useSSL=true&requireSSL=true&verifyServerCertificate=true&connectTimeout=10000}

# Tighten logging in production
logging.level.com.tejaswin.campus=INFO
logging.level.org.springframework.security=WARN
