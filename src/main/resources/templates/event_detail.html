<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${event.title} + ' - CampusConnect'">CampusConnect Event</title>

    <!-- Essential dynamic Open Graph Tags for Social Media Sharing -->
    <meta property="og:title" th:content="${event.title}">
    <meta property="og:description" th:content="${event.description}">
    <!-- Absolute URL for social crawlers -->
    <meta property="og:image" th:if="${event.imageUrl != null}"
        th:content="${event.imageUrl.startsWith('http') ? event.imageUrl : baseUrl + event.imageUrl}">
    <meta property="og:url" th:content="${baseUrl + '/student/event/' + event.id}">
    <meta property="og:type" content="article">

    <!-- Twitter Card data -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" th:content="${event.title}">
    <meta name="twitter:description" th:content="${event.description}">
    <meta name="twitter:image" th:if="${event.imageUrl != null}"
        th:content="${event.imageUrl.startsWith('http') ? event.imageUrl : baseUrl + event.imageUrl}">

    <link rel="stylesheet" th:href="@{/css/style.css?v=13}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            background: var(--bg-0);
        }
    </style>
</head>

<body>
    <div class="glass-card text-center p-5">
        <div class="spinner-border text-primary mb-3" role="status"></div>
        <h3 class="fw-bold mb-2 text-white">Loading Event...</h3>
        <p class="text-muted">Redirecting you to the dashboard.</p>

        <!-- Redirect automatically to the dashboard with the specific event open -->
        <script th:inline="javascript">
            const eventId = /*[[${event.id}]]*/ '0';
            setTimeout(() => {
                window.location.href = '/student/dashboard?open=' + eventId;
            }, 800);
        </script>

        <noscript>
            <p>If you are not redirected, <a th:href="@{/student/dashboard(open=${event.id})}">click here</a>.</p>
        </noscript>
    </div>
</body>

</html>
