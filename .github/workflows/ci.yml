name: Java CI with Maven

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: campus_events
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Make Maven Wrapper executable
      run: chmod +x ./mvnw
      
    - name: Build with Maven
      env:
        SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/campus_events?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&connectTimeout=10000
        MYSQLHOST: 127.0.0.1
        MYSQLPORT: 3306
        MYSQLUSER: root
        MYSQLPASSWORD: root
      run: ./mvnw -B package --file pom.xml
